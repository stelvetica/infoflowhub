{% extends "base.html" %}

{% block title %}微信公众号登录{% endblock %}

{% block body %}
<div class="shell">
  <main class="main">
    <section class="card" style="max-width: 520px; margin: 40px auto;">
      <div class="panel-title">
        <h3>微信公众号扫码登录</h3>
      </div>
      <p class="subtle" style="margin-bottom: 16px;">打开这个页面后，用有公众号后台权限的微信扫一次码。我会自动把登录态写入本地运行文件。</p>
      <div id="wechat-login-app" data-wechat-login>
        <div class="wechat-login-box">
          <div class="wechat-login-qr" id="wechat-login-qr">正在准备二维码...</div>
          <p class="wechat-login-status" id="wechat-login-status">初始化中...</p>
          <div class="wechat-login-actions">
            <button class="btn" type="button" id="wechat-login-refresh">刷新二维码</button>
            <a class="btn ghost" href="/?view=settings">返回设置</a>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>
{% endblock %}
